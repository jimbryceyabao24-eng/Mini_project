<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>HTML Video Player</title>
</head>
<body>
    <div class="player">
        <video class="player_video viewer" src="video/14283378_1920_1080_25fps.mp4"></video>

        <div class="player_controls">
            <div class="progress">
                <div class="progress__filled"></div>
            </div>
            <button class="player_button  toggle" title="TogglePlay">▶</button>
            <input type="range" name="volume" class="player__slider" min="0" max="1" step="0.05" value="1">
            <input type="range" name="playBackRate" class="player__slider" min="0.5" max="2" step="0.1" value="1">
            
            <button data-skip="-10" class="player_button">« 10s</button>
            <button data-skip="25" class="player_button">25s »</button>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
